{% extends "base.html" %}
{% block title %}Login - IntegrityCloud{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
  <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-teal-500"></div>

    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-white">Login</h2>
      <p class="text-zinc-400 text-sm mt-2">Access your IntegrityCloud dashboard</p>
    </div>

    {% if error %}
    <div class="mb-6 p-4 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm font-medium flex items-center gap-3">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Username or Email</label>
        <input name="username" placeholder="e.g. jaynesh or jaynesh@gmail.com" required
               class="w-full px-4 py-3 bg-black border border-zinc-700 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white transition-colors">
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Password</label>
        <div class="relative">
          <input name="password" id="password" type="password" placeholder="••••••••" required
                 class="w-full px-4 py-3 bg-black border border-zinc-700 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white transition-colors">
          
          <button type="button" onclick="togglePassword()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-zinc-500 hover:text-zinc-300 transition-colors">
            <svg id="eye-icon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full py-3 px-4 bg-white text-black font-bold rounded-lg hover:bg-zinc-200 transition-colors shadow-lg mt-2">
        Login
      </button>
    </form>

    <div class="mt-6 flex items-center justify-between border-t border-zinc-800 pt-6">
      <a href="/forgot" class="text-sm text-zinc-400 hover:text-white transition-colors">Forgot password?</a>
      <a href="/signup" class="text-sm text-zinc-400 hover:text-emerald-400 transition-colors font-medium">Create account</a>
    </div>
  </div>
</div>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('eye-icon');
    if (input.type === 'password') {
      input.type = 'text';
      // Eye-Slash icon
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.978 9.978 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />';
    } else {
      input.type = 'password';
      // Normal Eye icon
      icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />';
    }
  }
</script>
{% endblock %}
