{% extends "base.html" %}
{% block title %}Sign Up - IntegrityCloud{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] py-8">
  <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-2xl shadow-2xl w-full max-w-md relative overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-500 to-teal-500"></div>

    <div class="text-center mb-8">
      <h2 class="text-2xl font-bold text-white">Create Account</h2>
      <p class="text-zinc-400 text-sm mt-2">Start using IntegrityCloud as a SaaS</p>
    </div>

    {% if error %}
    <div class="mb-6 p-4 rounded-lg bg-rose-500/10 border border-rose-500/30 text-rose-400 text-sm font-medium flex items-center gap-3">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Username</label>
        <input name="username" placeholder="Choose a username" required
               class="w-full px-4 py-3 bg-black border border-zinc-700 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white transition-colors">
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Email Address</label>
        <input name="email" type="email" placeholder="you@example.com" required
               class="w-full px-4 py-3 bg-black border border-zinc-700 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white transition-colors">
      </div>

      <div>
        <label class="block text-sm font-medium text-zinc-400 mb-1">Password</label>
        <input name="password" type="password" placeholder="Minimum 6 characters" required
               class="w-full px-4 py-3 bg-black border border-zinc-700 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 text-white transition-colors">
      </div>

      <button type="submit" class="w-full py-3 px-4 bg-white text-black font-bold rounded-lg hover:bg-zinc-200 transition-colors shadow-lg mt-2">
        Sign up
      </button>
    </form>

    <div class="mt-6 text-center border-t border-zinc-800 pt-6 text-sm text-zinc-400">
      Already have an account? <a href="/" class="text-emerald-400 font-medium hover:text-emerald-300 transition-colors">Login</a>
    </div>
  </div>
</div>
{% endblock %}
